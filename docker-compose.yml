version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: icpm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-icpm}
      POSTGRES_USER: ${POSTGRES_USER:-icpm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - icpm_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: icpm_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-icpm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-icpm}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: production
    depends_on:
      - db
    networks:
      - icpm_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: icpm_frontend
    restart: unless-stopped
    networks:
      - icpm_net

  nginx:
    image: nginx:alpine
    container_name: icpm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - icpm_net

volumes:
  pgdata:

networks:
  icpm_net:
    driver: bridge
