worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    # HTTP → HTTPS Redirect
    server {
        listen 80;
        server_name icpm.sunico.de;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name icpm.sunico.de;

        ssl_certificate     /etc/letsencrypt/live/icpm.sunico.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/icpm.sunico.de/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security Headers (DSGVO/OWASP)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        # API Proxy → Backend
        location /api/ {
            proxy_pass         http://icpm_backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Frontend (React PWA)
        location / {
            proxy_pass http://icpm_frontend:8080;
            proxy_set_header Host $host;
            # PWA: SPA-Routing
            try_files $uri $uri/ /index.html;
        }
    }
}
