# Diesen server{}-Block in /home/ubuntu/fittrack/nginx/nginx.conf einfügen
# (vor der letzten schließenden Klammer des http{}-Blocks)
# Danach: docker exec fittrack-nginx-1 nginx -s reload

    server {
        listen 443 ssl http2;
        server_name icpm.sunico.de;

        ssl_certificate     /etc/letsencrypt/live/icpm.sunico.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/icpm.sunico.de/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL_icpm:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Resolver für Docker-interne DNS-Auflösung (nötig für $upstream Variablen)
        set $icpm_frontend icpm_frontend;
        set $icpm_backend  icpm_backend;

        # API → iC-PM Backend (Node.js Port 3000)
        location /api/ {
            proxy_pass         http://$icpm_backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
        }

        # Frontend → iC-PM React PWA (nginx Port 8080)
        location / {
            proxy_pass         http://$icpm_frontend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
