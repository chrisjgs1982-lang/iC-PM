# Dieses File auf dem VPS ablegen:
# /etc/nginx/sites-available/icpm.sunico.de
# Dann: sudo ln -s /etc/nginx/sites-available/icpm.sunico.de /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS
server {
    listen 80;
    server_name icpm.sunico.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → Docker Container (Port 8443)
server {
    listen 443 ssl http2;
    server_name icpm.sunico.de;

    ssl_certificate     /etc/letsencrypt/live/icpm.sunico.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/icpm.sunico.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy → iC-PM Docker nginx (intern Port 8443)
    location / {
        proxy_pass         https://127.0.0.1:8443;
        proxy_ssl_verify   off;   # intern, self-signed OK
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
    }
}
